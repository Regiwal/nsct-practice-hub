<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSCT Practice Hub</title>
    <script>
        // This must be BEFORE the tailwind cdn script
        tailwind.config = {
            darkMode: 'class', // Use 'selector' if using Tailwind v3.4.1+
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gradient-to-br from-blue-950 via-slate-900 to-black text-gray-100 min-h-screen font-sans transition-colors duration-300">

    <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-yellow-400">NSCT Preparation<span class="text-white">Hub</span></h1>
        <div class="flex gap-4 items-center">
            <span id="saved-progress-badge"
                class="hidden text-xs bg-orange-500 text-white px-2 py-1 rounded-full">Progress Saved</span>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-white/10 transition">🌓</button>
        </div>
    </nav>

    <main id="app-container" class="container mx-auto px-4 py-8 max-w-4xl">
    </main>

    <script src="app.js"></script>
</body>

</html>
